<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Pro</title>

  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <h1>⏳ Pomodoro Pro</h1>

  <div class="card">
    <h2 id="timer">25:00</h2>

    <input type="number" id="study" placeholder="Study (25)">
    <input type="number" id="break" placeholder="Break (5)">

    <div>
      <button id="startBtn">Start</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="card">
    <h3>📊 Stats</h3>
    <p>📚 Today Study: <span id="todayMinutes">0</span> min</p>
    <p>⏱ Total Study: <span id="totalHours">0</span> hrs</p>
    <p>🔥 Streak: <span id="streak">0</span> days</p>
  </div>

  <div class="card">
    <h3>🧠 Daily Life</h3>

    <input type="number" id="sleep" placeholder="Sleep (hrs)">
    <input type="number" id="screen" placeholder="Screen (hrs)">
    <button onclick="saveDailyData()">Save</button>

    <p>📚 Study: <span id="studyHours">0</span> hrs</p>
    <p>😴 Sleep: <span id="sleepHours">0</span> hrs</p>
    <p>📱 Screen: <span id="screenHours">0</span> hrs</p>
    <p>🧩 Other: <span id="otherHours">0</span> hrs</p>
  </div>

  <div class="card">
    <h3>📈 Monthly Progress</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<script src="js/app.js"></script>
<script src="js/timer.js"></script>
<script src="js/stats.js"></script>
<script src="js/chart.js"></script>

</body>
</html>
